name: Generate Pac-Man Contribution Graph

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *" # regenerate daily at midnight UTC
  workflow_dispatch: # allow manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit the SVGs back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate Pac-Man SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          GITHUB_USERNAME: PROTOX11
        run: python generate_pacman.py

      - name: Commit and push SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pacman-contribution-dark.svg pacman-contribution-light.svg
          git diff --cached --quiet || git commit -m "chore: update pac-man contribution graph [skip ci]"
          git push
